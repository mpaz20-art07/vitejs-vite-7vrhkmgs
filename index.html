<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Biblioteca de Anime</title>
<style>
  :root{
  --bg: #0b0f14;
  --panel: #121826;
  --card: #0f1624;
  --text: #e6e6f0;
  --muted: #9aa3b2;
  --accent: #7c4dff;
  --accent-2: #a78bfa;
  --danger: #ff5c7a;
  --ok: #3ddc97;
  --warn: #ffd166;
  --gap: 20px;
  --poster-w: 305px;   /* ancho del póster */
  --poster-h: 570px;   /* alto del póster */
  --radius: 14px;
  --shadow: 0 10px 30px rgba(0,0,0,.35);
}
  .theme-violet {
    --bg: #0a0a0f;
    --panel: #0f1020;
    --card: #12122a;
    --text: #f0eaff;
    --muted: #bfb7d9;
    --accent: #8b5cf6;
    --accent-2: #c4b5fd;
  }
  html,body{height:100%;}
  body {
  margin: 0;
  background: var(--bg) center/cover fixed no-repeat;
  color: var(--text);
  font-family: Georgia, serif;
}
  .app{display:grid; grid-template-columns: 280px 1fr; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    background: var(--panel);
    border-right: 1px solid #1f2433;
    padding: 20px;
    position: sticky; top:0;
  }
  .sidebar h2{margin:0 0 12px;font-size:18px;}
  .sidebar-logo {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 12px;
}
.sidebar-logo img {
  max-width: 100%;
  height: auto;
}
  .sidebar button, .sidebar .cat{
    width:100%; margin:6px 0; padding:10px 12px; border-radius:10px;
    border:1px solid #232a3a; background:#0e1422; color:var(--text); cursor:pointer;
  }
  .sidebar .cat.active{border-color:var(--accent); box-shadow:0 0 0 2px inset var(--accent);}
  .sidebar .small{font-size:12px;color:var(--muted);}
  .sidebar.collapsed{width:72px; grid-column:1/2; padding:12px;}
  .sidebar.collapsed .hide-when-collapsed{display:none;}

  /* Top bar */
  .main{display:flex; flex-direction:column;}
  .top{
    position:sticky; top:0; z-index:10;
    background: linear-gradient(180deg, rgba(10,12,18,.95), rgba(10,12,18,.75));
    backdrop-filter: blur(6px);
    border-bottom:1px solid #1f2433;
  }
  .top-inner{padding:16px; display:flex; flex-wrap:wrap; gap:12px; align-items:center;}
  .title{font-size:28px; font-weight:700; letter-spacing:.3px;}
  .filters, .special{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{
    padding:8px 12px; border-radius:999px; border:1px solid #232a3a;
    background:#0e1422; color:var(--text); cursor:pointer;
  }
  .chip.active{border-color:var(--accent); background:#1a1f33;}
  .chip:hover {
  background: var(--accent);
  color: #fff;
}
.chip.danger {
  border-color: var(--danger);
  color: var(--danger);
}
  .spacer{flex:1;}
  .search {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 16px;       /* separa del bloque superior */
  margin-bottom: 16px;    /* separa del bloque inferior */
  margin-left: 20px;
}
.search input {
  width: 260px;
  max-width: 40vw;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--accent);   /* borde violeta */
  background: #0e1422;
  color: var(--text);
  box-shadow: 0 0 0 2px inset var(--accent); /* efecto resaltado como categorías */
}
.search button {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--accent);
  background: #1a1f33;
  color: var(--text);
  cursor: pointer;
}
.search button:hover {
  background: var(--accent);
  color: #fff;
}
  .btn.danger{border-color:var(--danger); color:#ffdfe6;}

  /* Grid fijo de 6 columnas y 2 filas visibles */
.columns {
  display: grid;
  grid-template-columns: repeat(6, var(--poster-w)); /* 6 columnas fijas */
  gap: 16px;
  padding: 20px; /* margen interno para que no toquen los bordes */
}

  /* Card póster */
  .card{
  width: var(--poster-w);
  height: var(--poster-h);
  background: linear-gradient(180deg, #0f1624, #0b1220);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border:1px solid #1f2433;
  display:flex; flex-direction:column; overflow:hidden;
  position:relative; cursor:pointer;
}
.card .cover{
  height: 80%;
  background:#111;
  background-position:center;
  background-size: contain; /* imagen completa sin recorte */
}
.card .meta{
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size: 14px; /* un poco más grande */
}
.card .name{font-weight:700;font-size: 16px; /* nombre más visible */}
  .badge{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);}
  .status-visto{color:var(--ok);}
  .status-novisto{color:#9bd1ff;}
  .status-falta{color:var(--warn);}

  /* Carta “+” única */
  .card.add-card{
    display:flex; align-items:center; justify-content:center;
    font-size:64px; font-weight:800; color:var(--accent);
    background:rgba(124,77,255,.1);
    border:1px dashed var(--accent);
  }
  .card.add-card:hover{background:rgba(124,77,255,.2);}

  /* Panel de detalles */
  .details{
    position: fixed; right: 20px; top: 80px; bottom: 20px;
    width: 420px; max-width: 90vw; background: var(--panel);
    border:1px solid #1f2433; border-radius: 16px; box-shadow: var(--shadow);
    display:none; overflow:auto; z-index: 3000;
  }
  .details.visible{display:block;}
  .details-header{
    position:sticky; top:0; background:linear-gradient(180deg, rgba(18,24,38,.95), rgba(18,24,38,.75));
    backdrop-filter: blur(6px);
    padding:12px; border-bottom:1px solid #1f2433;
    display:flex; gap:8px; align-items:center; justify-content:space-between;
  }
  .details-body{padding:12px; display:flex; flex-direction:column; gap:12px;}
  .details .poster-preview{
    width:100%; height:320px; border-radius:12px; background:#111; background-size:cover; background-position:center;
    border:1px solid #232a3a;
  }
  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-size:13px; color:var(--muted);}
  .field input[type="textarea"], .field textarea, .field select, .field input[type="number"]{
    padding:10px 12px; border-radius:10px; border:1px solid #232a3a; background:#0e1422; color:var(--text);
  }
  .field input[type="text"],
.field textarea {
  width: 100%;              /* ocupa todo el ancho */
  box-sizing: border-box;   /* incluye padding/border en el ancho */
  min-height: 20px;
  resize: vertical;
  padding: 6px 8px;
  border-radius: 8px;
  border: 1px solid #232a3a;
  background: #0e1422;
  color: var(--text);
}

  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .row .field{flex:1;}

  /* Configuración */
  .settings{
    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 520px; max-width: 95vw; background: var(--panel);
    border:1px solid #1f2433; border-radius:16px; box-shadow: var(--shadow);
    display:none; overflow:hidden;
  }
  .settings.visible{display:block;}
  .settings-header{padding:12px; border-bottom:1px solid #1f2433; display:flex; justify-content:space-between; align-items:center;}
  .settings-body{padding:12px; display:flex; flex-direction:column; gap:12px;}
</style>
</head>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="https://i.pinimg.com/736x/3d/29/12/3d2912c18c13923c3b86fcf99c6d500b.jpg" alt="Logo Biblioteca de Anime">
      </div>
      <h2 class="hide-when-collapsed">Categorías</h2>
      <button class="cat active" data-cat="Anime">Anime</button>
      <button class="cat" data-cat="Manga">Manga</button>
      <button class="cat" data-cat="Películas">Películas</button>
      <button class="cat" data-cat="Manhwa">Manhwa</button>
      <button class="cat" data-cat="Manhua">Manhua</button>
      <button class="cat" data-cat="Pendientes en General">Pendientes en General</button>

      <div class="hide-when-collapsed" style="margin-top:16px;">
        <button class="btn" id="openSettings">Configuración</button>
        <div class="field">
          <button class="chip" id="loginGoogle">Iniciar sesión con Google</button>
          <button class="chip" id="logoutGoogle">Cerrar sesión</button>
          <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
            <img id="userPhoto" alt="Foto de usuario" style="width:40px; height:40px; border-radius:50%; display:none;">
            <span id="userName"></span>
            <span id="sessionStatus" style="margin-left:12px; color:var(--muted);"></span>
          </div>
        </div>        
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="top">
        <div class="top-inner">
          <div class="title">Biblioteca de Anime</div>
    
          <!-- Filtros por estado (arriba junto al título) -->
          <div class="filters" id="stateFilters">
            <button class="chip" id="showAll">Todos</button>
            <button class="chip" data-state="Visto">Visto</button>
            <button class="chip" data-state="No visto">No visto</button>
            <button class="chip" data-state="Falta terminar">Falta terminar</button>
          </div>
          <!-- Filtros especiales por persona -->
      <div class="special" id="personFilters">
        <button class="chip" data-person="Maria Paz">Maria Paz</button>
        <button class="chip" data-person="Milena">Milena</button>
        <button class="chip" data-person="Maria Paz y Milena">Maria Paz y Milena</button>
      </div>
    </div>
  </div>
    
      <!-- Buscador global (ahora en el mismo sector que los filtros) -->
      <div class="search">
        <input type="text" id="searchInput" placeholder="Buscar..." />
        <button class="btn" id="searchButton">Buscar</button>
      </div>
    
      <!-- Contenedor de pósters -->
      <section class="columns" id="columns"></section>
    </main>    
  </div> <!-- cierre de .app -->

  <!-- Configuración (overlay independiente) -->
  <div class="settings" id="settings">
    <div class="settings-header">
      <strong>Configuración</strong>
      <button class="chip" id="closeSettings">Cerrar</button>
    </div>
    <div class="settings-body">
      <div class="field">
        <label>Tema</label>
        <select id="themeSelect">
          <option value="default">Negro con todos violetas (por defecto)</option>
          <option value="violet">Negro con todos violetas (intenso)</option>
        </select>
      </div>
      <div class="field">
        <label>Poner una imagen de fondo</label>
        <input type="file" id="bgUpload" accept="image/*" />
        <small class="small"></small>
      </div>
    </div>
  </div>

  <!-- Panel de detalles (overlay independiente) -->
  <aside class="details" id="details">
    <div class="details-header">
      <strong>Detalles</strong>
      <div>
        <button class="chip" id="closeDetails">Cerrar</button>
        <button class="chip danger" id="deleteItem">Eliminar</button>
      </div>
    </div>
    <div class="details-body" id="detailsBody"></div>
  </aside>

<script>
/* ====== Utilidades ====== */
const uid = () => Math.random().toString(36).slice(2,9);
const el = sel => document.querySelector(sel);
const els = sel => Array.from(document.querySelectorAll(sel));

/* ====== Estado global ====== */
const STORAGE_KEY = 'animeLibrary_v3';
const state = {
  items: [],
  currentCategory: 'Anime',
  filterState: null,      // null = sin filtro
  filterPerson: null,     // null = sin filtro
  search: '',
  selectedId: null,
  theme: 'violet',
  bgImage: null
};

/* ====== Inicialización ====== */
window.onload = () => {
  // Configuración del buscador global
  el('#searchInput').oninput = e=>{
    state.search = e.target.value; // guarda en memoria
  };

  el('#searchButton').onclick = ()=>{
    render(); // aplica el filtro recién al apretar "Buscar"
  };

  // Primera renderización
  render();
};

/* ====== Render ====== */
function render(){
  // Tema y fondo
  document.body.classList.toggle('theme-violet', state.theme === 'violet');
  document.body.style.backgroundImage = state.bgImage ? `url(${state.bgImage})` : 'none';

  // Sidebar categorías
  els('.cat').forEach(b=>{
    b.classList.toggle('active', b.dataset.cat === state.currentCategory);
  });

  // Chips activos (estado/persona)
  els('#stateFilters .chip').forEach(c=>{
    const isAll = c.id === 'showAll';
    c.classList.toggle('active',
      (isAll && !state.filterState && !state.filterPerson && !state.search) ||
      (!isAll && c.dataset.state === state.filterState)
    );
  });
  els('#personFilters .chip').forEach(c=>{
    c.classList.toggle('active', c.dataset.person === state.filterPerson);
  });

  // Filtrado
  const container = el('#columns');
  container.innerHTML = '';
  const filtered = state.items.filter(it=>{
    if(it.category !== state.currentCategory) return false;
    if(state.filterState && it.status !== state.filterState) return false;
    if(state.filterPerson && it.person !== state.filterPerson) return false;
    const q = state.search.trim().toLowerCase();
    if(q){
      const hay = (it.name||'').toLowerCase().includes(q)
        || (it.genre||'').toLowerCase().includes(q)
        || (it.extra||'').toLowerCase().includes(q)
        || (it.order !== undefined ? String(it.order).toLowerCase().includes(q) : false)
      if(!hay) return false;
    }
    return true;
  });

  // Render cards
  for(const it of filtered){
    const card = document.createElement('article');
    card.className = 'card';
    card.dataset.id = it.id;

    const cover = document.createElement('div');
    cover.className = 'cover';
    cover.style.backgroundImage = it.cover ? `url(${it.cover})` : 'linear-gradient(135deg,#1b2236,#0f1624)';
    card.appendChild(cover);

    const meta = document.createElement('div');
    meta.className = 'meta';

    // Campo editable de nombre usando fieldInput
// Dentro de render(), al crear el input del nombre
const nameField = fieldInput("", it.name, (newValue) => { 
  it.name = newValue; // solo memoria mientras escribís
});

const inputEl = nameField.querySelector("input");
inputEl.onblur = () => {
  window.updateItem(it.id, { name: it.name }); // guarda recién al salir
};
meta.appendChild(nameField);

    const badge = document.createElement('div');
    badge.className = 'badge';
    if(it.category === 'Pendientes en General'){
      badge.innerHTML = `<span>${it.tipo || 'Sin tipo'}</span>`;
    } else {
      badge.innerHTML = `
        <span class="${statusClass(it.status)}">${it.status||'Sin estado'}</span>
        · <span>${it.category}</span>
        ${it.person ? '· <span>'+it.person+'</span>' : ''}
      `;
    }
    meta.appendChild(badge);

    card.appendChild(meta);
    card.addEventListener('click', ()=> openDetails(it.id));

    // Drag & drop
    card.draggable = true;
    card.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('id', it.id);
    });

    container.appendChild(card);
  }

  // Carta “+” única al final
  const addCard = document.createElement('article');
  addCard.className = 'card add-card';
  addCard.textContent = '+';
  addCard.onclick = () => window.addItem(); // solo se ejecuta al click
  container.appendChild(addCard);

  // Contenedor drop
  container.addEventListener('dragover', e=> e.preventDefault());
  container.addEventListener('drop', e=>{
    e.preventDefault();
    const draggedId = e.dataTransfer.getData('id');
    const target = e.target.closest('.card');
    if(!target || !target.dataset.id || target.classList.contains('add-card')) return;
    reorderWithinCurrentView(draggedId, target.dataset.id);
  });

  // Panel detalles
  const details = el('#details');
  details.classList.toggle('visible', !!state.selectedId);
  if(state.selectedId){
    const it = state.items.find(x=>x.id===state.selectedId);
    renderDetails(it);
  }
}

function statusClass(s){
  if(s==='Visto') return 'status-visto';
  if(s==='No visto') return 'status-novisto';
  if(s==='Falta terminar') return 'status-falta';
  return '';
}

/* ====== Panel de detalles ====== */
function openDetails(id){ state.selectedId = id; render(); }
function closeDetails(){ state.selectedId = null; render(); }

function renderDetails(it){
  const body = el('#detailsBody');
  body.innerHTML = '';

  const preview = document.createElement('div');
  preview.className = 'poster-preview';
  preview.style.backgroundImage = it.cover ? `url(${it.cover})` : 'linear-gradient(135deg,#1b2236,#0f1624)';
  body.appendChild(preview);

  // Comunes
  body.appendChild(fieldInput('Nombre', it.name, v=> updateItem(it.id,{name:v})));
  body.appendChild(fieldInput('Género', it.genre||'', v=> updateItem(it.id,{genre:v})));

  // Por categoría
  if(it.category==='Pendientes en General'){

  body.appendChild(fieldSelect('Tipo', it.tipo||'Anime',
    ['Anime','Manga','Manhwa','Manhua','Película'],
    v=> updateItem(it.id,{tipo:v}),
    false
  ));

  body.appendChild(fieldTextarea('Notas', it.notas||'', v=> updateItem(it.id,{notas:v})));
}
  if(it.category==='Anime'){
    body.appendChild(fieldSelect('Estado', it.status||'No visto', ['Visto','No visto','Falta terminar'], v=>{
      updateItem(it.id,{status:v});
    }, true));
    body.appendChild(fieldTextarea('Progreso para terminar', it.progress||'', v=> updateItem(it.id,{progress:v})));
    body.appendChild(fieldYesNoWithText('Película', it.movie||{has:false,text:''}, v=> updateItem(it.id,{movie:v})));
    body.appendChild(fieldYesNoWithText('Ova', it.ova||{has:false,text:''}, v=> updateItem(it.id,{ova:v})));
    body.appendChild(fieldTextarea('Orden Cronológico', it.order||'', v=> updateItem(it.id,{order:v})));
  }else if(['Manga','Manhwa','Manhua'].includes(it.category)){
    body.appendChild(fieldText('Último capitulo visto', it.lastChapter||'', v=> updateItem(it.id,{lastChapter:v})));
    body.appendChild(fieldTextarea('Contenido Adicional', it.extra||'', v=> updateItem(it.id,{extra:v})));
    body.appendChild(fieldSelect('Estado', it.status||'No visto', ['Visto','No visto','Falta terminar'], v=>{
      updateItem(it.id,{status:v});
    }, true));
  }else if(it.category==='Películas'){
    body.appendChild(fieldSelect('Estado', it.status||'No visto', ['Visto','No visto'], v=>{
      updateItem(it.id,{status:v});
    }, true));
   
  }

  // Persona
  body.appendChild(fieldSelect('Asignar a', it.person||'Todos', ['Maria Paz','Milena','Maria Paz y Milena','Todos'], v=>{
    updateItem(it.id,{person:v});
  }, false));

  // Portada por URL
  body.appendChild(fieldImageUrl('Portada (URL)', it.cover || '', v=> updateItem(it.id,{cover:v})));

}

/* ====== Campos UI helpers ====== */
function fieldText(label, value, onChange){
  const wrap = document.createElement('div');
  wrap.className = 'field';
  const lab = document.createElement('label');
  lab.textContent = label;
  wrap.appendChild(lab);

  const inp = document.createElement('textarea');
  inp.value = value || '';
  inp.rows = 2;              // altura inicial
  inp.style.resize = 'vertical'; // solo se puede ampliar hacia abajo
  inp.oninput = e => onChange(e.target.value);

  wrap.appendChild(inp);
  return wrap;
}
function fieldTextarea(label, value, onChange){
  const wrap = document.createElement('div'); wrap.className='field';
  const lab = document.createElement('label'); lab.textContent = label; wrap.appendChild(lab);
  const inp = document.createElement('textarea'); inp.rows=4; inp.value=value||''; inp.oninput = e=> onChange(e.target.value);
  wrap.appendChild(inp); return wrap;
}
function fieldInput(label, value, onChange){
  const wrap = document.createElement('div');
  wrap.className = 'field';

  const lab = document.createElement('label');
  lab.textContent = label;
  wrap.appendChild(lab);

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = value || '';

  // Solo actualiza en memoria mientras escribís
  inp.oninput = (e) => {
    onChange(e.target.value, false); // false = no guardar todavía
  };

  // Guarda en Firestore recién al salir del campo
  inp.onblur = () => {
    onChange(inp.value, true); // true = guardar en base
  };

  inp.style.fontSize = '13px';
  inp.style.padding = '8px 10px';

  wrap.appendChild(inp);
  return wrap;
}
function fieldNumber(label, value, onChange, min=0, max=100){
  const wrap = document.createElement('div'); wrap.className='field';
  const lab = document.createElement('label'); lab.textContent = label; wrap.appendChild(lab);
  const inp = document.createElement('input'); inp.type='number'; inp.min=min; inp.max=max; inp.value=value||0; inp.oninput = e=> onChange(Number(e.target.value));
  wrap.appendChild(inp); return wrap;
}
function fieldSelect(label, value, options, onChange, lockText){
  const wrap = document.createElement('div'); wrap.className='field';
  const lab = document.createElement('label'); lab.textContent = label; wrap.appendChild(lab);
  const sel = document.createElement('select');
  options.forEach(o=>{ const op=document.createElement('option'); op.value=o; op.textContent=o; sel.appendChild(op); });
  sel.value = value || options[0];
  sel.onchange = e=> onChange(e.target.value);
  wrap.appendChild(sel);
  if(lockText){
    const small = document.createElement('small'); small.className='small'; small.textContent='(Selecciona una opción)';
    wrap.appendChild(small);
  }
  return wrap;
}
function fieldYesNoWithText(label, valueObj, onChange){
  const wrap = document.createElement('div');
  wrap.className='field';

  const lab = document.createElement('label');
  lab.textContent = label;
  wrap.appendChild(lab);

  // Selector Sí/No
  const sel = document.createElement('select');
  ['No','Sí'].forEach(o=>{
    const op=document.createElement('option');
    op.value=o; op.textContent=o;
    sel.appendChild(op);
  });
  sel.value = valueObj.has ? 'Sí' : 'No';
  wrap.appendChild(sel);

  // Recuadro en forma de textarea
  const inp = document.createElement('textarea');
  inp.placeholder='Escribe aquí...';
  inp.value = valueObj.text || '';
  inp.style.display = valueObj.has ? 'block' : 'none';
  inp.rows = 2;                 // altura inicial
  inp.style.resize = 'vertical'; // se puede agrandar hacia abajo
  wrap.appendChild(inp);

  // Eventos
  sel.onchange = e=>{
    const has = e.target.value === 'Sí';
    inp.style.display = has ? 'block' : 'none';
    onChange({has, text: has ? inp.value : ''});
  };
  inp.oninput = e=>{
    onChange({has: sel.value==='Sí', text: e.target.value});
  };

  return wrap;
}
function fieldImageUrl(label, value, onChange){
  const wrap = document.createElement('div'); wrap.className='field';
  const lab = document.createElement('label'); lab.textContent = label; wrap.appendChild(lab);
  const inp = document.createElement('input'); inp.type='text'; inp.placeholder='https://...'; inp.value = value || '';
  inp.oninput = e=> onChange(e.target.value);
  wrap.appendChild(inp); return wrap;
}

/* ====== Reordenar (drag & drop) ====== */
/* Reordena dentro de la vista actual (misma categoría y respetando filtros) */
async function reorderWithinCurrentView(draggedId, targetId){
  const viewIds = state.items
    .filter(it=>{
      if(it.category !== state.currentCategory) return false;
      if(state.filterState && it.status !== state.filterState) return false;
      if(state.filterPerson && it.person !== state.filterPerson) return false;
      const q = state.search.trim().toLowerCase();
      if(q){
        const hay = (it.name||'').toLowerCase().includes(q)
          || (it.genre||'').toLowerCase().includes(q)
          || (it.extra||'').toLowerCase().includes(q)
          || (it.order||'').toLowerCase().includes(q);
        if(!hay) return false;
      }
      return true;
    })
    .map(it=>it.id);

  const draggedIndexGlobal = state.items.findIndex(x=>x.id===draggedId);
  const targetIndexGlobal  = state.items.findIndex(x=>x.id===targetId);
  if(draggedIndexGlobal<0 || targetIndexGlobal<0) return;

  const [dragged] = state.items.splice(draggedIndexGlobal,1);
  const insertIndex = state.items.findIndex(x=>x.id===targetId);
  state.items.splice(insertIndex,0,dragged);

  await window.saveItem(dragged);
  render();
}

/* ====== Eventos UI ====== */
function bindUI(){
  // Categorías
  els('.cat').forEach(b=>{
    b.onclick = ()=>{
      state.currentCategory = b.dataset.cat;
      // Al cambiar categoría, limpia filtros para evitar confusiones
      state.filterState = null;
      state.filterPerson = null;
      state.search = '';
      closeDetails();
      render();
    };
  });

  // Filtros estado
  els('#stateFilters .chip').forEach(c=>{
    if(c.id==='showAll'){
      c.onclick = ()=>{
        state.filterState = null;
        state.filterPerson = null;
        state.search = '';
        render();
      };
    }else{
      c.onclick = ()=>{
        state.filterState = c.dataset.state;
        render();
      };
    }
  });

  // Filtros persona
  els('#personFilters .chip').forEach(c=>{
    c.onclick = ()=>{
      state.filterPerson = c.dataset.person;
      render();
    };
  });

  // Detalles
  el('#closeDetails').onclick = closeDetails;
  el('#deleteItem').onclick = ()=>{ 
    if(state.selectedId) deleteItem(state.selectedId); 
  };

  // Configuración
  el('#openSettings').onclick = () => {
  el('#settings').classList.add('visible');
};
el('#closeSettings').onclick = () => {
  el('#settings').classList.remove('visible');
};

  el('#themeSelect').onchange = e=>{
    state.theme = (e.target.value==='violet') ? 'violet' : 'default';
    render();
  };
  el('#bgUpload').onchange = e=>{
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = ()=>{ state.bgImage = reader.result;render(); };
    reader.readAsDataURL(f);
  };
}

/* ====== Inicialización ====== */
bindUI();
render();
</script>
<script type="module">
// --- Firebase ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  setDoc, 
  onSnapshot, 
  doc, 
  deleteDoc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAryB4erEaKzVvoanroPYUTR5R2Gkxfbfw",
  authDomain: "biblioteca-de-anime.firebaseapp.com",
  projectId: "biblioteca-de-anime",
  storageBucket: "biblioteca-de-anime.appspot.com",
  messagingSenderId: "669443336610",
  appId: "1:669443336610:web:f581882586b1eb862feafb",
  measurementId: "G-X2FSRD2VS6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- CRUD expuesto al global ---
window.addItem = async function() {
  const cat = state.currentCategory;
  const base = {
    id: uid(),
    category: cat,
    name: '',
    cover: '',
    genre: '',
    person: 'Todos',
    order: state.items.length // número secuencial
  };

  if(cat === 'Pendientes en General'){
    base.tipo = 'Anime';
    base.notas = '';
  } else {
    base.status = 'No visto';
    base.progress = 0;
    base.movie = {has:false,text:''};
    base.ova = {has:false,text:''};
    base.sequence = '';
    base.lastChapter = '';
    base.extra = '';
  }

  state.items.push(base);
  await window.saveItem(base);
  render();
  openDetails(base.id);
};

window.updateItem = async function(id, patch){
  const i = state.items.findIndex(x => x.id === id);
  if(i >= 0){
    state.items[i] = {...state.items[i], ...patch};
    await window.saveItem(state.items[i]);
  }
};

window.deleteItem = async function(id){
  state.items = state.items.filter(x => x.id !== id);
  closeDetails();
  await deleteDoc(doc(collection(db, "posters"), id));
  render();
};

window.saveItem = async function(item) {
  await setDoc(doc(collection(db, "posters"), item.id), item);
  render()
};

// --- Listener en tiempo real ---
onSnapshot(collection(db, "posters"), (snapshot) => {
  const newItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  newItems.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  state.items = newItems;
  render();

  // Refresca la vista solo si no estás escribiendo en un input
  if (!document.activeElement || document.activeElement.tagName !== 'INPUT') {
    render();
  }
});

// --- Login con Google ---
el('#loginGoogle').onclick = () => {
  signInWithPopup(auth, provider).then(result => {
    const user = result.user;
    mostrarUsuario(user);
  }).catch(err => {
    console.error("Error en login:", err);
  });
};

// --- Logout ---
el('#logoutGoogle').onclick = () => {
  signOut(auth);
};

// --- Detectar cambios de sesión ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    mostrarUsuario(user);
    el('#sessionStatus').textContent = "Sesión activa";
  } else {
    el('#userPhoto').style.display = 'none';
    el('#userName').textContent = '';
    el('#sessionStatus').textContent = "Sesión cerrada";
  }
});

// --- Mostrar foto y nombre ---
function mostrarUsuario(user) {
  el('#userPhoto').src = user.photoURL;
  el('#userPhoto').style.display = 'block';
  el('#userName').textContent = user.displayName;
}
</script>
